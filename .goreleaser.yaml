project_name: atlantis-emoji-gate

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    mod_timestamp: '{{ .CommitTimestamp }}'
    main: ./cmd/emoji-gate

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))?\!?:.*$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))?\!?:.*$'
      order: 1
    - title: Maintenance
      regexp: '^.*?(chore|ci|docs|refactor|test)(\([[:word:]]+\))?\!?:.*$'
      order: 2
    - title: Other
      order: 999
